<div class="item-row item-row-helper !items-start p-3" 
     data-prefix="{{ drug_form.prefix }}" 
     x-data="{ showNotes: false }">
  {% for hidden in drug_form.hidden_fields %}{{ hidden }}{% endfor %}
  
  <!-- آیکون جابجایی -->
  <span class="item-braille-handle mt-6" title="برای جابجایی بکشید">⠿</span>
  
  <!-- بخش میانی: ورودی اصلی و توضیحات زیر آن -->
  <div class="flex-1 flex flex-col gap-3">
    
    <!-- ورودی نام دارو -->
    <div class="w-full">
        <label class="text-xs text-gray-500 mb-1 block">نام دارو</label>
        <div x-data="drugSearch('{{ drug_form.instance.drug.id|default:'' }}', '{{ drug_form.instance.drug.title|default:'' }}')" class="relative w-full">
          <input type="hidden" name="{{ drug_form.drug.html_name }}" x-model="selectedId">
          
          <input type="text"
            x-model="searchQuery"
            @input.debounce.500ms="fetchDrugs()"
            @focus="isOpen = true"
            @click.away="isOpen = false"
            placeholder="نام دارو را جستجو کنید..."
            class="item-name-input w-full px-3 py-2 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-indigo-400">
            
          <div x-show="isOpen" style="display:none"
            class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto">
            <template x-for="item in results" :key="item.id">
              <div @click="selectDrug(item)" class="px-3 py-2 cursor-pointer hover:bg-indigo-50 text-xs text-gray-700 border-b border-gray-50" x-text="item.text"></div>
            </template>
            <div x-show="isLoading" class="px-3 py-2 text-xs text-gray-500">در حال جستجو...</div>
            <div x-show="!isLoading && (searchQuery?.length || 0) > 1" class="px-3 py-2 bg-gray-50">
                <div x-show="results?.length === 0" class="text-xs text-red-500 mb-2">موردی یافت نشد.</div>
                <button type="button" @click.stop.prevent="openCreateModal()" class="text-xs text-indigo-600 hover:text-indigo-800 font-bold w-full text-right flex items-center gap-1">
                    <i class="fas fa-plus-circle"></i><span>افزودن سریع دارو</span>
                </button>
            </div>
          </div>
        </div>
    </div>

    <!-- بخش توضیحات (داخل ستون میانی باز می‌شود) -->
    <div x-show="showNotes" x-transition style="display:none;" class="w-full">
        <label class="text-xs text-indigo-500 font-semibold mb-1.5 block">توضیحات و دستور مصرف</label>
        {{ drug_form.notes }}
    </div>

  </div>
  
  <!-- ستون دکمه‌ها -->
  <div class="flex items-center gap-2 mt-5">
      <button type="button" @click="showNotes = !showNotes" class="flex items-center justify-center gap-1.5 px-3 py-1.5 border border-indigo-200 bg-indigo-50 text-indigo-600 rounded-lg text-xs hover:bg-indigo-100 transition-colors">
          <i class="fas fa-align-left"></i>
          <span x-text="showNotes ? 'بستن' : 'توضیحات'"></span>
      </button>

      <button type="button" class="btn-delete-item" title="حذف" onclick="removeItem(this)">
        <i class="fas fa-times"></i>
      </button>
  </div>
  
  <div style="display:none">
    {{ drug_form.DELETE }}
    {{ drug_form.order_index }}
  </div>
</div>
