<div class="item-row item-row-helper bg-gray-50 p-3 rounded border border-gray-200 mb-2" data-prefix="{{ drug_form.prefix }}">
    {% for hidden in drug_form.hidden_fields %}{{ hidden }}{% endfor %}
    <div class="grid grid-cols-12 gap-3 items-center">
        <div class="col-span-5">
            <label class="text-xs text-gray-500 mb-1 block">نام دارو</label>
            
            <!-- کامپوننت جستجوی دارو با Alpine.js -->
            <div x-data="drugSearch('{{ drug_form.instance.drug.id|default:'' }}', '{{ drug_form.instance.drug.name|default:'' }}')" class="relative w-full">
                <!-- فیلد مخفی برای ارسال آیدی به فرم -->
                <input type="hidden" name="{{ drug_form.drug.html_name }}" x-model="selectedId">
                
                <!-- فیلد ورودی جستجو -->
                <input type="text" 
                       x-model="searchQuery" 
                       @input.debounce.500ms="fetchDrugs()" 
                       @focus="isOpen = true" 
                       @click.away="isOpen = false"
                       placeholder="نام دارو را جستجو کنید..."
                       class="item-name-input w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 text-sm">
                       
                <!-- دراپ‌داون نتایج جستجو -->
                <div x-show="isOpen" 
                     style="display: none;"
                     class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded shadow-lg max-h-60 overflow-y-auto">
                    
                    <template x-for="item in results" :key="item.id">
                        <div @click="selectDrug(item)" 
                             class="px-4 py-2 cursor-pointer hover:bg-blue-50 text-sm text-gray-700"
                             x-text="item.text">
                        </div>
                    </template>
                    
                    <div x-show="isLoading" class="px-4 py-2 text-sm text-gray-500">در حال جستجو...</div>
                    <div x-show="!isLoading && results?.length === 0 && (searchQuery?.length || 0) > 1" class="px-4 py-2 text-sm text-red-500">موردی یافت نشد.</div>
                </div>
            </div>

        </div>
        <div class="col-span-6">
            <label class="text-xs text-gray-500 mb-1 block">توضیحات (Notes)</label>
            {{ drug_form.notes }}
        </div>
        <div class="col-span-1 flex justify-end mt-4">
            <button type="button" onclick="removeItem(this)" class="text-red-500 hover:text-red-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="hidden">{{ drug_form.DELETE }}</div>
    </div>
</div>
