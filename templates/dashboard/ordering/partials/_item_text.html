<style>
  .btn-delete-item {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 6px;
    border: 1px solid #fecaca; background: #fff5f5;
    color: #ef4444; cursor: pointer; font-size: 0.75rem;
    flex-shrink: 0; transition: all .15s;
  }
  .btn-delete-item:hover,
  .btn-delete-item.active { background: #ef4444; color: #fff; border-color: #ef4444; }

  .item-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; border-bottom: 1px solid #f1f5f9;
    background: #fff;
  }
  .item-row:nth-child(even) { background: #f8fafc; }
  .item-row:hover { background: #f0f4ff; }
  .item-row input[type="text"], .item-row textarea {
    font-size: 0.8rem; padding: 4px 8px;
    border: 1px solid #e2e8f0; border-radius: 6px; width: 100%;
  }
  .item-braille-handle {
    cursor: grab; color: #cbd5e1; font-size: 1rem;
    padding: 0 4px; user-select: none; line-height: 1;
  }
  .item-braille-handle:hover { color: #94a3b8; }
  .item-braille-handle:active { cursor: grabbing; }
</style>

<div class="item-row item-row-helper !items-start p-3" 
     data-prefix="{{ item_form.prefix }}" 
     x-data="{ showNotes: false }">
  {% for hidden in item_form.hidden_fields %}{{ hidden }}{% endfor %}
  
  <!-- آیکون جابجایی -->
  <span class="item-braille-handle mt-6" title="برای جابجایی بکشید">⠿</span>
  
  <!-- بخش میانی: متن اصلی و توضیحات زیر آن -->
  <div class="flex-1 flex flex-col gap-3">
    
    <div class="w-full">
        <label class="text-xs text-gray-500 mb-1 block">متن آیتم</label>
        {{ item_form.text }}
    </div>

    <!-- بخش توضیحات -->
    <div x-show="showNotes" x-transition style="display:none;" class="w-full">
        <label class="text-xs text-indigo-500 font-semibold mb-1.5 block">توضیحات تکمیلی</label>
        {{ item_form.notes }}
    </div>

  </div>

  <!-- ستون دکمه‌ها -->
  <div class="flex items-center gap-2 mt-5">
      <button type="button" @click="showNotes = !showNotes" class="flex items-center justify-center gap-1.5 px-3 py-1.5 border border-indigo-200 bg-indigo-50 text-indigo-600 rounded-lg text-xs hover:bg-indigo-100 transition-colors">
          <i class="fas fa-align-left"></i>
          <span x-text="showNotes ? 'بستن' : 'توضیحات'"></span>
      </button>

      <button type="button" class="btn-delete-item" title="حذف" onclick="removeItem(this)">
        <i class="fas fa-times"></i>
      </button>
  </div>

  <div style="display:none">
    {{ item_form.DELETE }}
    {{ item_form.order_index }}
  </div>
</div>
