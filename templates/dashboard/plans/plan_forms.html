<!-- Plan Modal -->
<div x-show="isPlanModalOpen" 
     x-cloak 
     @keydown.escape.window="closePlanModal()"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 overflow-y-auto">
    
    <div class="flex min-h-screen items-center justify-center p-4">
        <div @click="closePlanModal()" 
             class="fixed inset-0 bg-slate-900 bg-opacity-60 backdrop-blur-sm"></div>
        
        <div x-show="isPlanModalOpen"
             @click.stop
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="relative z-10 w-full max-w-md md:max-w-2xl bg-white rounded-xl shadow-2xl my-8 flex flex-col max-h-[90vh]">
            
            <div class="flex-shrink-0 p-5 md:p-6 flex justify-between items-center border-b border-slate-200 bg-white rounded-t-xl">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center ml-3">
                        <i class="fa-solid fa-box text-green-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg md:text-xl font-bold text-slate-800" x-text="modalTitle"></h3>
                        <p class="text-sm text-slate-500">مدیریت پلن‌های سیستم</p>
                    </div>
                </div>
                <button @click="closePlanModal()" 
                        class="p-2 text-slate-400 hover:text-slate-700 rounded-full hover:bg-slate-100 transition-colors">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 md:p-8">
                <form @submit.prevent="submitPlanForm()" id="planForm">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-layer-group ml-2 text-blue-500"></i>
                                نوع Membership
                            </label>
                            <select x-model="planForm.membership" 
                                    required
                                    class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                                <option value="">انتخاب Membership</option>
                                {% for membership in memberships %}
                                <option value="{{ membership.id }}">{{ membership.title }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-tag ml-2 text-green-500"></i>
                                نام پلن
                            </label>
                            <input type="text" 
                                   x-model="planForm.name" 
                                   placeholder="مثال: بسته ۱ ماهه" 
                                   required
                                   class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-calendar-day ml-2 text-purple-500"></i>
                                مدت زمان (روز)
                            </label>
                            <input type="number" 
                                   x-model="planForm.duration_days" 
                                   placeholder="30" 
                                   min="1"
                                   required
                                   class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                            <p class="mt-2 text-xs text-slate-500">
                                مدت زمان به روز وارد شود
                            </p>
                        </div>

                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-tags ml-2 text-red-500"></i>
                                قیمت (تومان)
                            </label>
                            <input type="number" 
                                   x-model="planForm.price" 
                                   placeholder="1000000" 
                                   min="0"
                                   required
                                   class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                        </div>

                        <!-- برچسب پلن‌ها -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <div class="form-field lg:col-span-2">
                                <label class="block text-sm font-semibold text-slate-700 mb-3">
                                    <i class="fa-solid fa-bookmark ml-2 text-indigo-500"></i>
                                    برچسب نمایشی (اختیاری)
                                </label>
                                <select x-model="planForm.tag" 
                                        class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                                    <option value="">بدون برچسب</option>
                                    {% for tag_value, tag_label in plan_tags %}
                                    <option value="{{ tag_value }}">{{ tag_label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-r from-slate-50 to-green-50 rounded-xl p-5 mb-6 border border-slate-200">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                            <div class="flex items-center">
                                <input type="checkbox"
                                       x-model="planForm.is_active" 
                                       class="h-5 w-5 text-green-600 focus:ring-green-500 border-slate-300 rounded transition-all duration-200">
                                <label class="mr-3 block text-sm font-semibold text-slate-700">
                                    <i class="fa-solid fa-toggle-on ml-2 text-green-500"></i>
                                    پلن فعال است
                                </label>
                            </div>
                            <div class="text-xs text-slate-600 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                                <i class="fa-solid fa-lightbulb ml-1 text-yellow-500"></i>
                                پلن‌های غیرفعال قابل خرید نیستند
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="flex-shrink-0 border-t border-slate-200 px-6 md:px-8 py-4 bg-slate-50 rounded-b-xl">
                <div class="flex flex-col-reverse md:flex-row justify-end items-center gap-3">
                    <button type="button" 
                            @click="closePlanModal()" 
                            class="w-full md:w-auto py-3 md:py-2.5 px-6 text-sm font-semibold bg-white border-2 border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 hover:border-slate-400 transition-all duration-200">
                        <i class="fa-solid fa-times ml-2"></i>
                        انصراف
                    </button>
                    <button type="submit" 
                            form="planForm"
                            :disabled="isLoading"
                            class="w-full md:w-auto py-3 md:py-2.5 px-8 text-sm font-semibold bg-gradient-to-r from-green-600 to-green-700 text-white rounded-lg hover:from-green-700 hover:to-green-800 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="!isLoading" class="flex items-center justify-center">
                            <i class="fa-solid fa-save ml-2"></i>
                            <span x-text="isEditMode ? 'بروزرسانی پلن' : 'ایجاد پلن'"></span>
                        </span>
                        <span x-show="isLoading" class="flex items-center justify-center">
                            <i class="fa-solid fa-spinner fa-spin ml-2"></i>
                            در حال پردازش...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Membership Modal -->
<div x-show="isMembershipModalOpen" 
     x-cloak 
     @keydown.escape.window="closeMembershipModal()"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 overflow-y-auto">
    
    <div class="flex min-h-screen items-center justify-center p-4">
        <div @click="closeMembershipModal()" 
             class="fixed inset-0 bg-slate-900 bg-opacity-60 backdrop-blur-sm"></div>
        
        <div x-show="isMembershipModalOpen"
             @click.stop
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="relative z-10 w-full max-w-md bg-white rounded-xl shadow-2xl my-8 flex flex-col max-h-[90vh]">
            
            <div class="flex-shrink-0 p-5 md:p-6 flex justify-between items-center border-b border-slate-200 bg-white rounded-t-xl">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center ml-3">
                        <i class="fa-solid fa-layer-group text-blue-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg md:text-xl font-bold text-slate-800" x-text="modalTitle"></h3>
                        <p class="text-sm text-slate-500">مدیریت Membership‌ها</p>
                    </div>
                </div>
                <button @click="closeMembershipModal()" 
                        class="p-2 text-slate-400 hover:text-slate-700 rounded-full hover:bg-slate-100 transition-colors">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 md:p-8">
                <form @submit.prevent="submitMembershipForm()" id="membershipForm">
                    <div class="space-y-6">
                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-heading ml-2 text-blue-500"></i>
                                عنوان Membership
                            </label>
                            <input type="text" 
                                   x-model="membershipForm.title" 
                                   placeholder="مثال: پریمیوم" 
                                   required
                                   class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                        </div>

                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-align-left ml-2 text-green-500"></i>
                                توضیحات
                            </label>
                            <textarea x-model="membershipForm.description" 
                                      placeholder="توضیحات درباره این نوع اشتراک..."
                                      rows="3"
                                      class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200"></textarea>
                        </div>

                        <div class="form-field">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">
                                <i class="fa-solid fa-list-check ml-2 text-purple-500"></i>
                                ویژگی‌ها و دسترسی‌ها (چند انتخاب)
                            </label>
                            <select multiple
                                    x-model="membershipForm.features" 
                                    class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200"
                                    style="min-height: 120px;">
                                {% for feature in features %}
                                    <option value="{{ feature.id }}">{{ feature.name }}</option>
                                {% endfor %}
                            </select>
                            <p class="text-xs text-slate-500 mt-2">برای انتخاب چند مورد، کلید Ctrl (یا Cmd در مک) را نگه دارید.</p>
                        </div>

                        <div class="bg-gradient-to-r from-slate-50 to-blue-50 rounded-xl p-5 border border-slate-200">
                            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                <div class="flex items-center">
                                    <input type="checkbox"
                                           x-model="membershipForm.is_active" 
                                           class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-slate-300 rounded transition-all duration-200">
                                    <label class="mr-3 block text-sm font-semibold text-slate-700">
                                        <i class="fa-solid fa-toggle-on ml-2 text-blue-500"></i>
                                        Membership فعال است
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="flex-shrink-0 border-t border-slate-200 px-6 md:px-8 py-4 bg-slate-50 rounded-b-xl">
                <div class="flex flex-col-reverse md:flex-row justify-end items-center gap-3">
                    <button type="button" 
                            @click="closeMembershipModal()" 
                            class="w-full md:w-auto py-3 md:py-2.5 px-6 text-sm font-semibold bg-white border-2 border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 hover:border-slate-400 transition-all duration-200">
                        <i class="fa-solid fa-times ml-2"></i>
                        انصراف
                    </button>
                    <button type="submit" 
                            form="membershipForm"
                            :disabled="isLoading"
                            class="w-full md:w-auto py-3 md:py-2.5 px-8 text-sm font-semibold bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="!isLoading" class="flex items-center justify-center">
                            <i class="fa-solid fa-save ml-2"></i>
                            <span x-text="isEditMode ? 'بروزرسانی Membership' : 'ایجاد Membership'"></span>
                        </span>
                        <span x-show="isLoading" class="flex items-center justify-center">
                            <i class="fa-solid fa-spinner fa-spin ml-2"></i>
                            در حال پردازش...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Feature Modal -->
<div x-show="modals.feature"
     x-cloak
     @keydown.escape.window="modals.feature && closeFeatureModal()"
     class="fixed inset-0 z-50 overflow-y-auto"
     role="dialog"
     aria-modal="true"
     style="display: none;">
    
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <!-- Backdrop -->
        <div x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 bg-slate-900 bg-opacity-50" 
             @click="closeFeatureModal()"></div>
        
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
        
        <!-- Modal Content -->
        <div x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             @click.stop
             class="relative z-10 inline-block align-bottom bg-white rounded-2xl text-right overflow-hidden shadow-2xl transform sm:my-8 sm:align-middle sm:max-w-lg w-full">
            
            <!-- Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-gradient-to-l from-blue-50 to-slate-50">
                <h3 class="text-lg font-bold text-slate-800 flex items-center">
                    <i class="fa-solid fa-star text-yellow-500 ml-2"></i>
                    <span x-text="isEditMode ? 'ویرایش ویژگی' : 'افزودن ویژگی جدید'"></span>
                </h3>
                <button type="button"
                        @click="closeFeatureModal()" 
                        class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <!-- Form Body -->
            <form @submit.prevent="submitFeatureForm" class="p-6 space-y-5">
                
                <!-- Name Field -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        <i class="fa-solid fa-tag text-blue-500 ml-1"></i>
                        نام ویژگی
                        <span class="text-red-500">*</span>
                    </label>
                    <input type="text" 
                           x-model="featureForm.name" 
                           required 
                           class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200"
                           placeholder="مثال: دانلود فایل PDF">
                </div>
                
                <!-- Feature Type Field -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        <i class="fa-solid fa-layer-group text-purple-500 ml-1"></i>
                        نوع ویژگی
                        <span class="text-red-500">*</span>
                    </label>
                    <select x-model="featureForm.feature_type"
                            required
                            class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200">
                        <option value="">انتخاب کنید...</option>
                        {% for value, label in feature_types %}
                            <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Description Field -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        <i class="fa-solid fa-align-left text-green-500 ml-1"></i>
                        توضیحات (اختیاری)
                    </label>
                    <textarea x-model="featureForm.description" 
                              rows="3" 
                              class="w-full px-4 py-3 border border-slate-300 rounded-lg bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200 resize-none"
                              placeholder="توضیحات کامل..."></textarea>
                </div>
                
                <!-- Is Active Checkbox -->
                <div class="flex items-center">
                    <input type="checkbox" 
                           x-model="featureForm.is_active"
                           id="feature_is_active"
                           class="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-2 focus:ring-blue-400 transition-all">
                    <label for="feature_is_active" class="mr-3 text-sm font-medium text-slate-700 cursor-pointer">
                        <i class="fa-solid fa-toggle-on text-green-500 ml-1"></i>
                        فعال
                    </label>
                </div>
                
                <!-- Footer Buttons -->
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" 
                            @click="closeFeatureModal()" 
                            class="px-5 py-2.5 rounded-lg text-slate-700 font-medium hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-times ml-2"></i>
                        انصراف
                    </button>
                    <button type="submit" 
                            :disabled="isLoading"
                            class="px-6 py-2.5 bg-gradient-to-l from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-lg font-medium transition-all shadow-sm flex items-center justify-center min-w-[120px] disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-show="!isLoading" class="flex items-center">
                            <i class="fa-solid fa-save ml-2"></i>
                            <span x-text="isEditMode ? 'ذخیره تغییرات' : 'افزودن ویژگی'"></span>
                        </span>
                        <i x-show="isLoading" class="fa-solid fa-spinner fa-spin"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
