{# _field.html — رندر یکسان یک فیلد فرم با لیبل و خطا | ورودی: field #}
<div>
    {% if field.label %}
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
    {% endif %}
    {{ field }}
    {% if field.errors %}
    <p class="text-red-600 text-xs mt-1">{{ field.errors|striptags }}</p>
    {% endif %}
</div>
