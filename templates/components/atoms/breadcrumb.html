{# components/atoms/breadcrumb.html — بردکرامب #}
{# ورودی: items (لیست [{label, url}])، extra_classes (اختیاری) #}
<nav class="flex items-center text-sm {{ extra_classes }}" aria-label="Breadcrumb">
    <ol class="flex items-center flex-wrap gap-1">
        {% for item in items %}
            {% if forloop.last %}
                <li class="text-slate-600 font-medium">{{ item.label }}</li>
            {% else %}
                <li>
                    <a href="{{ item.url }}" class="text-slate-500 hover:text-c1 transition-colors">{{ item.label }}</a>
                </li>
                <li class="text-slate-300"><i class="fa-solid fa-chevron-left text-xs text-slate-400 mx-2"></i></li>
            {% endif %}
        {% endfor %}
    </ol>
</nav>
