<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت پیشرفته Order Set</title>
    <link rel="stylesheet" href="static/css/tailwind.css">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header Actions -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800">طراح قالب بالینی (Clinical Template Builder)</h1>
                <p class="text-sm text-slate-500 mt-2">سیستم مدیریت موجودیت‌های پویا و ویژگی‌های سفارشی</p>
            </div>
            <button onclick="generateJSON()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-lg font-semibold transition-all shadow-lg hover:shadow-indigo-500/30 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                تولید JSON و ارسال به بک‌اند
            </button>
        </div>

        <!-- Section: Categories -->
        <div id="categories-container" class="space-y-8">
            
            <!-- Category Box -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-visible">
                <div class="bg-slate-800 rounded-t-xl px-5 py-4 flex justify-between items-center">
                    <input type="text" value="IV Fluids (مایع درمانی)" class="bg-transparent text-white font-bold text-lg border-b border-dashed border-slate-500 focus:outline-none focus:border-white w-1/3">
                    <button class="text-sm bg-slate-700 hover:bg-slate-600 text-white px-4 py-1.5 rounded transition-colors">+ افزودن آیتم جدید</button>
                </div>
                
                <div class="p-5 space-y-4">
                    <!-- Complex Order Item -->
                    <div class="border border-slate-200 rounded-lg p-4 bg-slate-50 relative group transition-all hover:border-indigo-300 hover:shadow-md">
                        
                        <!-- Standard Fields Row 1 -->
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end mb-3">
                            <div class="md:col-span-5">
                                <label class="block text-xs text-slate-500 mb-1">عنوان دستور (Title)</label>
                                <input type="text" value="Serum N/S (نرمال سالین)" class="w-full border-slate-300 rounded text-sm px-3 py-2 font-medium">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">دوز (Dose)</label>
                                <input type="text" value="1 Lit" class="w-full border-slate-300 rounded text-sm px-3 py-2">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">نوع (Type)</label>
                                <select class="w-full border-slate-300 rounded text-sm px-3 py-2 bg-red-50 text-red-700">
                                    <option>STAT (فوری)</option>
                                    <option selected>Routine</option>
                                    <option>PRN (شرطی)</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs text-slate-500 mb-1">مسیر (Route)</label>
                                <select class="w-full border-slate-300 rounded text-sm px-3 py-2">
                                    <option selected>IV (وریدی)</option>
                                    <option>PO (خوراکی)</option>
                                </select>
                            </div>
                            <div class="md:col-span-1 flex items-center justify-center h-full pb-2">
                                <label class="flex flex-col items-center cursor-pointer">
                                    <span class="text-[10px] text-slate-500 mb-1">الزامی</span>
                                    <input type="checkbox" checked class="w-5 h-5 text-indigo-600 rounded">
                                </label>
                            </div>
                        </div>

                        <!-- Standard Fields Row 2 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 pb-4 border-b border-slate-200">
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">شرط اجرای دستور (PRN Condition)</label>
                                <input type="text" placeholder="مثال: if BS < 250" class="w-full border-yellow-300 bg-yellow-50 text-yellow-800 placeholder-yellow-400 rounded text-sm px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-500 mb-1">توضیحات بالینی (Note)</label>
                                <input type="text" placeholder="توضیحات برای پرستار..." class="w-full border-slate-300 rounded text-sm px-3 py-2 text-slate-600">
                            </div>
                        </div>

                        <!-- Dynamic Attributes Section (فیلدهای دلخواه) -->
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">فیلدهای سفارشی (Dynamic Attributes)</span>
                                <button onclick="addCustomField(this)" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">
                                    <span>+ ویژگی جدید</span>
                                </button>
                            </div>
                            
                            <!-- Custom Fields Container -->
                            <div class="space-y-2 custom-fields-container">
                                <!-- Existing Custom Field -->
                                <div class="flex gap-2 items-center">
                                    <input type="text" placeholder="نام فیلد (مثال: سرعت)" value="Infusion Rate" class="w-1/3 border-slate-300 bg-white rounded text-sm px-3 py-1.5 focus:border-indigo-500">
                                    <span class="text-slate-400">:</span>
                                    <input type="text" placeholder="مقدار (مثال: 100cc/hr)" value="1-3 hours" class="flex-1 border-slate-300 bg-white rounded text-sm px-3 py-1.5 focus:border-indigo-500">
                                    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 p-1" title="حذف">×</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // افزودن فیلد سفارشی کلید-مقدار
        function addCustomField(btn) {
            const container = btn.parentElement.nextElementSibling;
            const fieldHTML = `
                <div class="flex gap-2 items-center animate-pulse">
                    <input type="text" placeholder="نام فیلد (Key)" class="w-1/3 border-slate-300 bg-white rounded text-sm px-3 py-1.5 focus:ring-1 focus:ring-indigo-500">
                    <span class="text-slate-400">:</span>
                    <input type="text" placeholder="مقدار (Value)" class="flex-1 border-slate-300 bg-white rounded text-sm px-3 py-1.5 focus:ring-1 focus:ring-indigo-500">
                    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 p-1 text-lg leading-none">×</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', fieldHTML);
            setTimeout(() => container.lastElementChild.classList.remove('animate-pulse'), 300);
        }

        // شبیه‌سازی تولید JSON برای بک‌اند
        function generateJSON() {
            alert('در این مرحله، تمام فیلدهای استاندارد به عنوان ستون‌های دیتابیس و فیلدهای سفارشی به عنوان یک آبجکت JSONB خوانده شده و به بک‌اند ارسال می‌شوند.');
        }
    </script>
</body>
</html>
